<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Angelini - Sistema Integrato</title>
    <style>
        body { font-family: "Times New Roman", Times, serif; background: #333; margin: 0; padding: 0; color: #000; }
        .no-print { text-align: center; padding: 15px; background: #111; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #444; }
        .btn-menu { padding: 10px 20px; font-size: 14px; cursor: pointer; background: #fff; border: 2px solid #222; border-radius: 8px; font-weight: bold; margin: 0 5px; }
        
        .screen { display: none; background: white; width: 95%; max-width: 900px; margin: 20px auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; }
        .active { display: block; }

        /* --- HOME --- */
        #home-screen { text-align: center; padding: 60px 20px; }
        .logo-home { font-size: 45px; letter-spacing: 3px; margin-bottom: 10px; font-weight: bold; }
        .btn-large { width: 320px; padding: 20px; font-size: 16px; text-transform: uppercase; margin: 15px auto; display: block; cursor: pointer; border-radius: 10px; border: 2px solid #222; background: white; font-weight: bold; }

        /* --- LISTINO (GALLERIA IMMAGINI) --- */
        #listino { background: #222; padding: 20px; text-align: center; }
        .listino-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 10px; }
        .listino-item { position: relative; cursor: pointer; transition: transform 0.2s; border: 2px solid #444; border-radius: 8px; overflow: hidden; background: #000; }
        .listino-item:hover { transform: scale(1.03); border-color: #27ae60; }
        .listino-item img { width: 100%; height: auto; display: block; }
        .page-number { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        /* Modal per ingrandimento */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; cursor: zoom-out; }
        .modal img { max-width: 95%; max-height: 95%; border: 2px solid white; box-shadow: 0 0 30px rgba(255,255,255,0.2); }

        /* --- STAMPA --- */
        @media print {
            .no-print, .listino-grid { display: none !important; }
            .screen.active { display: block !important; width: 100% !important; margin: 0 !important; }
            /* Se stampi il listino, stampa tutte le immagini una per pagina */
            #listino.active .listino-item { display: block; page-break-after: always; border: none; }
            #listino.active .listino-item img { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <button class="btn-menu" onclick="goHome()">🏠 HOME</button>
        <button class="btn-menu" onclick="window.print()">🖨 STAMPA</button>
    </div>

    <div id="home-screen" class="screen active">
        <div class="logo-home">PHOTO ANGELINI</div>
        <div class="subtitle-home" style="text-align:center; margin-bottom:40px;">S.R.L. - Castellammare del Golfo</div>
        <button class="btn-large" onclick="showDoc('contratto')">📄 CONTRATTO MATRIMONIO</button>
        <button class="btn-large" onclick="showDoc('draft')">📝 DRAFT MATRIMONIO</button>
        <button class="btn-large" onclick="showDoc('listino')" style="border-color: #27ae60; color: #27ae60;">📖 SFOGLIA LISTINO PREZZI</button>
    </div>

    <div id="contratto" class="screen"> </div>
    <div id="draft" class="screen"> </div>

    <div id="listino" class="screen">
        <h2 style="color: white; margin-bottom: 20px;">Listino Prezzi 2025</h2>
        <div class="listino-grid">
            <div class="listino-item" onclick="zoomImg(this)">
                <img src="Copertina.jpg" alt="Copertina">
                <span class="page-number">Copertina</span>
            </div>
            <div class="listino-item" onclick="zoomImg(this)">
                <img src="Pagina (1).jpg" alt="Pagina 1">
                <span class="page-number">Pag. 1</span>
            </div>
            <div class="listino-item" onclick="zoomImg(this)">
                <img src="Pagina (2).jpg" alt="Pagina 2">
                <span class="page-number">Pag. 2</span>
            </div>
            <div class="listino-item" onclick="zoomImg(this)">
                <img src="Pagina (17).jpg" alt="Pagina 17">
                <span class="page-number">Pag. 17</span>
            </div>
        </div>
    </div>

    <div id="zoomModal" class="modal" onclick="this.style.display='none'">
        <img id="imgZoomed" src="">
    </div>

    <script>
        function showDoc(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function goHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('home-screen').classList.add('active');
        }

        function zoomImg(el) {
            const modal = document.getElementById('zoomModal');
            const img = document.getElementById('imgZoomed');
            img.src = el.querySelector('img').src;
            modal.style.display = 'flex';
        }
    </script>
</body>
</html>
